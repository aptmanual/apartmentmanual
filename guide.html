<style>
:root{
  --green:#527A43;--green-deep:#315927;--green-soft:#EEF5E9;--green-line:#D6E6CC;
  --cream:#F8F5EE;--paper:#FFFEFB;--beige:#EDE5D7;--sand:#D8CCB8;
  --choco:#5B4632;--choco-deep:#3F2E1D;
  --ink:#2D2821;--muted:#766D60;--soft:#9A9082;--line:#E3D9C8;--white:#fff;
  --warn:#C0492F;--warn-soft:#FDF0ED;
  --shadow:0 8px 24px rgba(45,40,33,.07);
  --r:16px;--safe-b:env(safe-area-inset-bottom,0px);
  font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}
body{background:var(--cream);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
button,input,select{font:inherit}button{border:0;background:none;cursor:pointer;color:inherit}a{text-decoration:none;color:inherit}
.wrap{width:min(100% - 32px,920px);margin-inline:auto}
.desktop{display:none}

/* header */
.hd{position:sticky;top:0;z-index:40;background:rgba(248,245,238,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.hd .in{height:56px;display:flex;align-items:center;gap:10px}
.logo{display:flex;align-items:center;gap:8px}
.logo-i{width:30px;height:30px;border:2px solid var(--green-deep);border-radius:8px;display:grid;place-items:center;color:var(--green-deep);flex:none;background:#fff}.logo-i svg{width:18px;height:18px}
.logo b{font-size:17px;letter-spacing:-.03em;color:var(--green-deep)}.logo small{font-size:16px;color:var(--muted);display:block}
.hd .nav{display:none;gap:24px;margin-left:22px}.hd .nav a{font-size:16px;font-weight:800;opacity:.8}.hd .nav a:hover{opacity:1;color:var(--green-deep)}
.hd-btn{margin-left:auto;height:34px;padding:0 10px;border-radius:10px;background:var(--green);color:#fff;font-weight:900;font-size:17px;display:flex;align-items:center;gap:5px;flex:none}.hd-btn svg{width:14px;height:14px}
@media(min-width:720px){.hd .in{height:68px}.logo-i{width:34px;height:34px}.logo b{font-size:17px}.logo small{font-size:16px}.hd-btn{height:40px;padding:0 14px;font-size:17px}}
@media(min-width:1040px){.hd .nav{display:flex;gap:34px;margin-left:26px}.hd .nav a{font-size:17px;font-weight:850}.desktop{display:block}.hd-btn{height:42px;padding:0 16px;font-size:16px}.wrap{width:min(100% - 48px,1060px)}}

/* crumb */
.crumb{padding:14px 0 0;font-size:16px;color:var(--muted);display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.crumb .sep{color:var(--sand)}.crumb b{color:var(--green-deep)}
/* clickable crumb tree */
.crumb-bar{background:rgba(248,245,238,.96);border-bottom:1px solid var(--line);position:relative;z-index:30}
.crumb{position:relative;padding:12px 0}
.crumb a.home{color:var(--green-deep);font-weight:800;text-decoration:none;flex:none}
.crumb-seg{appearance:none;border:none;background:none;font:inherit;color:var(--muted);font-weight:800;display:inline-flex;align-items:center;gap:3px;cursor:pointer;padding:4px 8px;border-radius:9px;transition:.12s;line-height:1.25;text-align:left}
.crumb-seg:hover{background:var(--green-soft);color:var(--green-deep)}
.crumb-seg .cv{width:13px;height:13px;opacity:.55;transition:.15s;flex:none}
.crumb-seg.open{background:var(--green-soft);color:var(--green-deep)}
.crumb-seg.open .cv{transform:rotate(180deg);opacity:1}
.crumb-seg:last-of-type{color:var(--green-deep)}
.crumb-dd{position:absolute;top:calc(100% - 4px);left:0;background:#fff;border:1px solid var(--line);border-radius:13px;box-shadow:0 14px 34px rgba(45,40,33,.16);padding:6px;min-width:210px;max-width:min(92vw,360px);max-height:62vh;overflow:auto;z-index:60}
.dd-item{display:flex;align-items:center;gap:8px;width:100%;text-align:left;appearance:none;border:none;background:none;font:inherit;font-size:15px;font-weight:700;color:var(--ink);padding:10px 11px;border-radius:10px;cursor:pointer;line-height:1.35}
.dd-item:hover{background:var(--green-soft)}
.dd-item.on{color:var(--green-deep);background:var(--green-soft)}
.dd-item .dc{width:15px;height:15px;flex:none;color:var(--green)}
.dd-item .dc.hide{visibility:hidden}
/* live thumbnail cards */
.case .img.thumb{background-size:cover;background-position:center;background-color:var(--beige)}
.case.sk{pointer-events:none}
.case.sk .img{animation:cpulse 1.25s ease-in-out infinite}
@keyframes cpulse{0%,100%{opacity:1}50%{opacity:.5}}
.cases-more{display:inline-flex;align-items:center;gap:6px;margin-top:14px;font-size:15px;font-weight:800;color:var(--green-deep);cursor:pointer;background:none;border:none;appearance:none;padding:6px 2px}
.cases-more:hover{text-decoration:underline}
.case-empty{grid-column:1/-1;color:var(--muted);font-weight:700;font-size:15px;padding:8px 2px}

/* hero */
.hero{padding:10px 0 18px}
.hero-grid{display:grid;grid-template-columns:1fr;gap:16px}
.hero h1{font-size:28px;line-height:1.15;letter-spacing:-.06em;font-weight:950;margin-top:8px}
.hero .lead{font-size:16px;color:var(--muted);margin-top:8px;max-width:42em}
.hero-img{border-radius:var(--r);overflow:hidden;min-height:160px;position:relative;display:grid;place-items:center;border:1px solid var(--line)}
.hero-img .ph{display:flex;flex-direction:column;align-items:center;gap:6px;color:rgba(255,255,255,.9)}
.hero-img .ph svg{width:36px;height:36px;opacity:.8}
.hero-img .ph span{font-size:16px;font-weight:800;opacity:.85}
.hero-img .label{position:absolute;bottom:10px;right:10px;font:800 10px/1 sans-serif;background:rgba(0,0,0,.3);color:#fff;padding:4px 8px;border-radius:999px}
.pills{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
.pill{height:36px;padding:0 13px;border:1.5px solid var(--sand);background:#fff;border-radius:999px;font-size:16px;font-weight:800;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:.15s}
.pill svg{width:14px;height:14px;opacity:.7}
.pill:hover{border-color:var(--green)}
.pill.on{background:var(--green);color:#fff;border-color:var(--green)}.pill.on svg{opacity:1}
/* summary visual */
.summary{display:grid;grid-template-columns:1fr;gap:14px}
.sum-visual{border-radius:14px;min-height:120px;position:relative;display:grid;place-items:center;overflow:hidden;border:1px solid var(--line)}
.sum-visual .ph{display:flex;flex-direction:column;align-items:center;gap:5px;color:rgba(255,255,255,.85)}
.sum-visual .ph svg{width:28px;height:28px;opacity:.7}
.sum-visual .ph span{font-size:17px;font-weight:800}
.sum-visual .label{position:absolute;bottom:8px;left:8px;font:800 9px/1 sans-serif;background:rgba(0,0,0,.28);color:#fff;padding:3px 7px;border-radius:999px}
@media(min-width:720px){.hero-grid{grid-template-columns:1.1fr .9fr;align-items:center}.hero-img{min-height:220px}.summary{grid-template-columns:1.1fr .9fr}.hero{padding:28px 0 22px}h1{font-size:36px}.hero .lead{font-size:17px}}
@media(min-width:1040px){.hero-img{min-height:280px}.hero{padding:36px 0 28px}h1{font-size:42px}.hero .lead{font-size:16px;max-width:36em}.sum-visual{min-height:160px}}
/* apt dropdown */
.aptsel{width:100%;height:44px;border:1.5px solid var(--sand);border-radius:12px;padding:0 12px;font-size:16px;background:#fff;color:var(--ink);appearance:auto}
.aptsel:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(82,122,67,.12)}
.apt-custom{margin-top:8px}

/* sections */
section{padding:0 0 22px}
.sec-t{font-size:17px;font-weight:950;letter-spacing:-.04em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec-t .badge{font-size:17px;font-weight:900;background:var(--green-soft);color:var(--green-deep);border:1px solid var(--green-line);border-radius:999px;padding:3px 8px}

/* summary card */
.summary{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
.summary h3{font-size:17px;font-weight:950;margin-bottom:12px}
.checks{display:flex;flex-direction:column;gap:10px}
.ck{display:flex;gap:9px;font-size:17px;line-height:1.5}
.ck .ic{width:22px;height:22px;border-radius:50%;background:var(--green);flex:none;display:grid;place-items:center}
.ck .ic svg{width:13px;height:13px}

/* steps */
.steps{display:grid;gap:14px}
@media(min-width:720px){.steps{grid-template-columns:repeat(3,1fr)}}
.step{background:#fff;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.step-h{padding:12px 14px;font-weight:950;font-size:16px;display:flex;align-items:center;gap:8px}
.step-h .n{width:24px;height:24px;border-radius:6px;display:grid;place-items:center;font-size:17px;font-weight:950;flex:none}
.step.diy .step-h{background:var(--green-soft);color:var(--green-deep)}.step.diy .n{background:var(--green);color:#fff}
.step.mfg .step-h{background:#FFF8ED;color:#8A6420}.step.mfg .n{background:#D4A243;color:#fff}
.step.mgmt .step-h{background:#EDF2F7;color:#4A5568}.step.mgmt .n{background:#5A6B7A;color:#fff}
.step.pro .step-h{background:var(--beige);color:var(--choco)}.step.pro .n{background:var(--choco);color:#fff}
.step-b{padding:14px;flex:1;display:flex;flex-direction:column}
.step-b ul{list-style:none;display:flex;flex-direction:column;gap:9px;flex:1}
.step-b li{display:flex;gap:8px;font-size:17px;line-height:1.5}
.step-b li .b{width:20px;height:20px;border-radius:6px;background:var(--green-soft);color:var(--green-deep);flex:none;display:grid;place-items:center;font:900 11px var(--font);margin-top:2px}
.step-b li b{font-weight:800;display:block;margin-bottom:2px}
.step-b li .desc{font-size:16px;color:var(--muted);line-height:1.55;display:block;margin-top:1px}
.step-b .act{margin-top:14px}
.btn{display:inline-flex;align-items:center;gap:7px;border-radius:10px;font-weight:900;font-size:17px;padding:10px 14px;transition:.15s;cursor:pointer;border:1.5px solid transparent;justify-content:center;width:100%}
.btn svg{width:16px;height:16px;flex:none}
.btn-g{background:#fff;color:#3c4043;border-color:var(--sand)}.btn-g:hover{background:#F7F5EF}
.btn-choco{background:var(--choco);color:#fff;border-color:var(--choco)}.btn-choco:hover{background:var(--choco-deep)}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}.btn-green:hover{background:var(--green-deep)}
.btn-ghost{background:#fff;color:var(--choco);border-color:var(--sand)}.btn-ghost:hover{background:var(--beige)}
.gg{width:16px;height:16px}

/* notice */
.notice{display:flex;gap:14px;background:var(--beige);border-radius:var(--r);padding:14px 16px;margin-top:14px;flex-wrap:wrap}
.notice .w{display:flex;gap:10px;flex:1;min-width:200px}
.notice .w svg{width:22px;height:22px;color:var(--choco);flex:none}
.notice .w h5{font-size:17px;font-weight:950;margin-bottom:6px}
.notice .w ul{list-style:none;display:flex;flex-direction:column;gap:4px}
.notice .w li{font-size:16px;color:var(--muted);padding-left:10px;position:relative}
.notice .w li::before{content:'•';position:absolute;left:0;color:var(--green)}
.notice .tip{flex:1;min-width:200px;display:flex;gap:9px;font-size:16px;color:var(--muted);line-height:1.55}
.notice .tip svg{width:18px;height:18px;color:#C79A3E;flex:none;margin-top:1px}
.notice .tip b{color:var(--ink)}

/* cases */
.cases{display:grid;gap:12px}
@media(min-width:720px){.cases{grid-template-columns:repeat(3,1fr)}.case .img{height:150px}}
.case{background:#fff;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:.15s}
.case:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(45,40,33,.1)}
.case .img{height:120px;position:relative;display:grid;place-items:center;color:#fff}
.case .img.c0{background:linear-gradient(135deg,#527A43,#315927)}
.case .img.c1{background:linear-gradient(135deg,#8A6E45,#5B4632)}
.case .img.c2{background:linear-gradient(135deg,#6E8A60,#46603A)}
.case .img.c3{background:linear-gradient(135deg,#5A7A8A,#2D5566)}
.case .tag{position:absolute;top:9px;left:9px;font:900 10px/1 sans-serif;background:rgba(0,0,0,.3);color:#fff;padding:4px 8px;border-radius:999px}
.case .ext{position:absolute;top:9px;right:9px;width:22px;height:22px;border-radius:6px;background:rgba(0,0,0,.3);display:grid;place-items:center}
.case .ext svg{width:12px;height:12px}
.case .img .ph{font-size:16px;opacity:.9;display:flex;align-items:center;gap:6px}
.case .img .ph svg{width:20px;height:20px;opacity:.8}
.case .bd{padding:12px 13px}
.case .src{display:flex;align-items:center;gap:5px;font:900 10.5px/1 sans-serif;color:var(--muted);margin-bottom:6px}
.case .src .d{width:14px;height:14px;border-radius:4px;background:#03C75A;color:#fff;display:grid;place-items:center;font:900 8px/1 sans-serif}
.case h4{font-size:17px;font-weight:900;line-height:1.35;letter-spacing:-.02em}
.case .meta{margin-top:7px;font-size:17px;color:var(--soft);font-weight:700}

/* choose */
.choose{display:grid;gap:12px}
@media(min-width:720px){.choose{grid-template-columns:1fr 1fr}}
.cc{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:18px;display:flex;gap:14px;align-items:flex-start}
.cc .ic{width:44px;height:44px;border-radius:11px;flex:none;display:grid;place-items:center;color:#fff}
.cc .ic svg{width:22px;height:22px}
.cc.diy .ic{background:var(--green)}.cc.pro .ic{background:var(--choco)}
.cc h4{font-size:17px;font-weight:950;margin-bottom:8px}
.cc ul{list-style:none;display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.cc li{font-size:16px;color:var(--muted);display:flex;gap:6px}
.cc li svg{width:14px;height:14px;color:var(--green);flex:none;margin-top:2px}

/* footer */
footer{padding:22px 0;border-top:1px solid var(--line)}
.foot{display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:17px;color:var(--soft)}
.foot b{color:var(--green-deep);font-size:16px}

/* ─── small phone ─── */
@media(max-width:360px){
  .wrap{width:min(100% - 24px,1060px)}
  h1{font-size:24px}
  .hero .lead{font-size:17px}
  .hero-img{min-height:130px}
  .pills{gap:5px}
  .pill{height:32px;padding:0 10px;font-size:17px}
  .summary{padding:12px}
  .summary h3{font-size:16px}
  .ck{font-size:16px}
  .step-h{font-size:17px;padding:10px 12px}
  .step-b{padding:12px}
  .step-b li{font-size:16px}
  .step-b li .desc{font-size:17px}
  .sec-t{font-size:17px}
  .cc{padding:14px}
  .cc h4{font-size:16px}
  .notice{padding:12px}
  .case .img{height:100px}
  .case h4{font-size:16px}
}

/* ─── tablet+ section spacing ─── */
@media(min-width:720px){
  section{padding:0 0 28px}
  .sec-t{font-size:19px}
  .summary{padding:22px}
  .summary h3{font-size:17px}
  .step-h{font-size:17px}
  .notice{gap:24px}
  .cc{padding:22px}
  footer{padding:30px 0}
}

/* ─── desktop spacing ─── */
@media(min-width:1040px){
  section{padding:0 0 34px}
  .sec-t{font-size:21px}
  .steps{gap:18px}
  .cases{gap:16px}
  .case .img{height:160px}
  .cc{padding:26px}
  .notice{padding:18px 24px}
}

/* overlay + sheet */
.ov{position:fixed;inset:0;z-index:80;background:rgba(45,40,33,.48);display:none;align-items:flex-end}.ov.open{display:flex}
@media(min-width:720px){.ov{align-items:center}}
.sheet{width:100%;max-width:480px;margin:0 auto;background:#fff;border-radius:20px 20px 0 0;padding:18px 18px calc(18px + var(--safe-b));box-shadow:0 -12px 30px rgba(0,0,0,.16);max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:up .25s ease}
@media(min-width:720px){.sheet{border-radius:22px;box-shadow:0 18px 50px rgba(0,0,0,.22)}}
@keyframes up{from{transform:translateY(20px);opacity:.6}to{transform:none;opacity:1}}
.sheet-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:14px}
.sheet h2{font-size:18px;font-weight:950}.sheet .sub{font-size:16px;color:var(--muted);margin-top:3px}
.x{width:32px;height:32px;border-radius:50%;background:var(--beige);font-size:18px;color:var(--muted);flex:none}
.field{margin-top:12px}.field label{display:block;font-size:16px;font-weight:950;margin-bottom:6px}.field .rq{color:var(--warn)}
.field input{width:100%;height:44px;border:1.5px solid var(--sand);border-radius:12px;padding:0 12px;font-size:16px}
.field input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(82,122,67,.12)}
.photos{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:6px}
.photo{position:relative;aspect-ratio:1;border-radius:9px;overflow:hidden;background:var(--beige)}.photo img{width:100%;height:100%;object-fit:cover}
.photo .rm{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:rgba(44,38,32,.8);color:#fff;font-size:16px;display:grid;place-items:center}
.addp{aspect-ratio:1;border:1.5px dashed var(--sand);border-radius:9px;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--muted);font-size:16px;font-weight:900}
.addp:hover{border-color:var(--green);color:var(--green-deep)}
.addp svg{width:16px;height:16px}
.hint{font-size:17px;color:var(--muted);margin-top:4px;line-height:1.5}.hint b{color:var(--ink)}
.pv{margin-top:14px;background:#F4F1EA;border-radius:13px;padding:12px}
.pv .h{font:900 11px/1 sans-serif;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}.pv .h svg{width:13px;height:13px}
.bbl{background:#fff;border-radius:12px 12px 12px 3px;padding:11px 13px;font-size:16px;line-height:1.6;box-shadow:0 1px 2px rgba(45,40,33,.06)}.bbl b{color:var(--green-deep)}
.bbl .thumbs{display:flex;gap:4px;margin-top:7px}.bbl .mini{width:32px;height:32px;border-radius:6px;overflow:hidden;background:var(--beige)}.bbl .mini img{width:100%;height:100%;object-fit:cover}
.send{width:100%;height:48px;margin-top:14px;border-radius:13px;background:var(--choco);color:#fff;font-weight:950;font-size:16px;display:flex;align-items:center;justify-content:center;gap:7px}
.send:disabled{opacity:.42;cursor:not-allowed}.send svg{width:17px;height:17px}
.sms-note{text-align:center;font-size:17px;color:var(--soft);margin-top:7px}

/* leave modal */
.lv{position:fixed;inset:0;z-index:95;background:rgba(45,40,33,.5);display:none;align-items:center;justify-content:center;padding:20px}.lv.open{display:flex}
.lv-card{background:#fff;border-radius:18px;max-width:340px;width:100%;padding:24px 22px;text-align:center;animation:up .2s ease}
.lv-card .ic{width:44px;height:44px;border-radius:50%;background:var(--green-soft);color:var(--green-deep);display:grid;place-items:center;margin:0 auto 12px}.lv-card .ic svg{width:22px;height:22px}
.lv-card h4{font-size:16px;font-weight:950;margin-bottom:7px}.lv-card p{font-size:16px;color:var(--muted);line-height:1.55;margin-bottom:16px}
.lv-btns{display:flex;gap:8px}.lv-btns .btn{flex:1}

/* office sheet */
.off-hint{display:flex;gap:9px;background:var(--green-soft);border:1px solid var(--green-line);border-radius:12px;padding:10px 12px;margin-top:8px;font-size:17px;color:var(--muted);line-height:1.5}
.off-hint svg{width:16px;height:16px;flex:none;color:var(--green-deep);margin-top:1px}
.off-hint b{color:var(--ink)}
</style>

 const isMobile=/android|iphone|ipad|ipod|mobile/i.test(navigator.userAgent);
 const s=SYM[cur],label=s.space+' '+s.fix+' · '+s.h1.join(' ');
 const ph=CS.photos.map((p,i)=>'<div class="photo"><img src="'+p+'"><button class="rm" onclick="rmPhoto('+i+')">×</button></div>').join('');

 const thumbs=CS.photos.length?'<div class="thumbs">'+CS.photos.slice(0,4).map(p=>'<div class="mini"><img src="'+p+'"></div>').join('')+(CS.photos.length>4?'<div class="mini" style="display:grid;place-items:center;font:900 10px sans-serif;color:var(--soft)">+'+String(CS.photos.length-4)+'</div>':'')+'</div>':'';
 const actionBtn = isMobile

 $('shConsult').innerHTML=

 ['cR','cP','cAcustom'].forEach(function(id){var el=$(id);if(el)el.oninput=cSync;});

 else if(crumbOpen==='fix') dd=fixes.map(fx=>ddItem(fx,fx===s.fix,'pickFix(\''+fx+'\')')).join('');

function fmtDate(d){return d&&d.length===8?d.slice(0,4)+'.'+d.slice(4,6)+'.'+d.slice(6,8):'';}
function caseSkelWrap(){let c='';for(let i=0;i<3;i++)c+='<div class="case sk"><div class="img c'+i+'"><div class="ph">'+IC.cam+'<span>불러오는 중…</span></div></div><div class="bd"><div class="src"><span class="d">N</span>네이버 블로그</div><h4>시공사례를 불러오고 있어요</h4></div></div>';return '<div class="cases">'+c+'</div>';}
function caseCard(p,i){
 const d=fmtDate(p.date);
 const img=p.thumb
  ?'<div class="img thumb" style="background-image:url(\''+p.thumb+'\')"><span class="tag">시공사례</span><span class="ext">'+IC.ext+'</span></div>'
  :'<div class="img c'+(i%4)+'"><span class="tag">시공 사진</span><span class="ext">'+IC.ext+'</span><div class="ph">'+IC.cam+'<span>실제 시공 사진</span></div></div>';
 return '<div class="case" onclick="openLv(\''+p.link+'\',\'네이버 블로그\')">'+img
  +'<div class="bd"><div class="src"><span class="d">N</span>네이버 블로그 글 보기</div><h4>'+p.title+'</h4>'
  +'<div class="meta">'+(d?d+' · ':'')+'송파·잠실 시공</div></div></div>';
}
function fallbackCases(s){
 const posts=(POSTS[s.id]||[]).slice(0,3);
 if(!posts.length) return '<div class="cases"><div class="case-empty">블로그 시공사례를 준비 중입니다.</div></div>';
 const c=posts.map(function(p,i){const has=!!p.url;const blogHome='https://m.blog.naver.com/'+BLOG_ID;
  return '<div class="case" onclick="openLv(\''+(has?p.url:blogHome)+'\',\'네이버 블로그\')"><div class="img c'+i+'"><span class="tag">시공 전·후 사진</span><span class="ext">'+IC.ext+'</span><div class="ph">'+IC.cam+'<span>실제 시공 사진</span></div></div><div class="bd"><div class="src"><span class="d">N</span>'+(has?'네이버 블로그 글 보기':'블로그 글 준비 중')+'</div><h4>'+p.title+'</h4><div class="meta">📍 송파구 · '+s.fix+' 시공 완료</div></div></div>';}).join('');
 return '<div class="cases">'+c+'</div>';
}
async function loadCases(s){
 const wrap=$('casesWrap'); if(!wrap)return;
 const tag=TAGMAP[s.id]||s.fix;
 const terms=tag.split(/\s+/).filter(Boolean).map(function(t){return '"'+t+'"';}).join(' ');
 const sQuery=(BLOG_SIGNATURE?'"'+BLOG_SIGNATURE+'" ':'')+terms;
 const searchUrl='https://search.naver.com/search.naver?ssc=tab.blog.all&query='+encodeURIComponent(sQuery);
 const moreBtn='<button class="cases-more" onclick="openLv(\''+searchUrl+'\',\'네이버 블로그\')">블로그에서 더 많은 사례를 보세요 →</button>';
 try{
  const res=await fetch(API_BLOG_SEARCH+'?tag='+encodeURIComponent(tag)+'&n=3',{cache:'no-store'});
  if(!res.ok)throw 0;
  const data=await res.json();
  if(!Array.isArray(data)||!data.length)throw 0;
  if(SYM[cur].id!==s.id)return;
  wrap.innerHTML='<div class="cases">'+data.slice(0,3).map(function(p,i){return caseCard(p,i);}).join('')+'</div>'+moreBtn;
 }catch(e){
  if(SYM[cur].id!==s.id)return;
  wrap.innerHTML=fallbackCases(s)+moreBtn;
 }
}

  const url='https://apartmentmanual.kr/guide.html?s='+s.id;
  document.title=title;
  document.querySelector('meta[name="description"]').content=desc;
  document.getElementById('canonicalUrl').href=url;
  document.getElementById('ogUrl').content=url;
  document.getElementById('ogTitle').content=title;
  document.getElementById('ogDesc').content=desc;
  document.getElementById('twTitle').content=title;
  document.getElementById('twDesc').content=desc;
  /* JSON-LD 업데이트 */
  const ld={
    '@context':'https://schema.org',
    '@type':'HowTo',
    'name':s.h1.join(' ')+' 해결 방법',
    'description':s.lead,
    'step':s.steps.map((st,i)=>({'@type':'HowToStep','position':i+1,'name':st[1],'text':st[2]||st[1]})),
    'publisher':{'@type':'LocalBusiness','name':'아파트 사용설명서','areaServed':'송파구, 잠실동'}
  };
  document.getElementById('jsonLd').textContent=JSON.stringify(ld,null,2);
}
updateMeta();
</script>
