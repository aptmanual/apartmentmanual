<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>아파트 사용설명서 — 증상 상세 페이지</title>
<style>
:root{
  --green:#527A43;--green-deep:#315927;--green-soft:#EEF5E9;--green-line:#D6E6CC;
  --cream:#F8F5EE;--paper:#FFFEFB;--beige:#EDE5D7;--sand:#D8CCB8;
  --choco:#5B4632;--choco-deep:#3F2E1D;
  --ink:#2D2821;--muted:#766D60;--soft:#9A9082;--line:#E3D9C8;--white:#fff;
  --warn:#C0492F;--warn-soft:#FDF0ED;
  --shadow:0 8px 24px rgba(45,40,33,.07);
  --r:16px;--safe-b:env(safe-area-inset-bottom,0px);
  font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}
body{background:var(--cream);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
button,input,select{font:inherit}button{border:0;background:none;cursor:pointer;color:inherit}a{text-decoration:none;color:inherit}
.wrap{width:min(100% - 32px,920px);margin-inline:auto}
.desktop{display:none}

/* header */
.hd{position:sticky;top:0;z-index:40;background:rgba(248,245,238,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.hd .in{height:56px;display:flex;align-items:center;gap:10px}
.logo{display:flex;align-items:center;gap:8px}
.logo-i{width:30px;height:30px;border:2px solid var(--green-deep);border-radius:8px;display:grid;place-items:center;color:var(--green-deep);flex:none;background:#fff}.logo-i svg{width:18px;height:18px}
.logo b{font-size:15px;letter-spacing:-.03em;color:var(--green-deep)}.logo small{font-size:9.5px;color:var(--muted);display:block}
.hd .nav{display:none;gap:24px;margin-left:22px}.hd .nav a{font-size:14px;font-weight:800;opacity:.8}.hd .nav a:hover{opacity:1;color:var(--green-deep)}
.hd-btn{margin-left:auto;height:34px;padding:0 10px;border-radius:10px;background:var(--green);color:#fff;font-weight:900;font-size:11.5px;display:flex;align-items:center;gap:5px;flex:none}.hd-btn svg{width:14px;height:14px}
@media(min-width:720px){.hd .in{height:68px}.logo-i{width:34px;height:34px}.logo b{font-size:17px}.logo small{font-size:10px}.hd-btn{height:40px;padding:0 14px;font-size:13px}}
@media(min-width:1040px){.hd .nav{display:flex;gap:34px;margin-left:26px}.hd .nav a{font-size:15px;font-weight:850}.desktop{display:block}.hd-btn{height:42px;padding:0 16px;font-size:14px}.wrap{width:min(100% - 48px,1060px)}}

/* crumb */
.crumb{padding:14px 0 0;font-size:12px;color:var(--muted);display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.crumb .sep{color:var(--sand)}.crumb b{color:var(--green-deep)}

/* hero */
.hero{padding:10px 0 18px}
.hero-grid{display:grid;grid-template-columns:1fr;gap:16px}
.hero h1{font-size:28px;line-height:1.15;letter-spacing:-.06em;font-weight:950;margin-top:8px}
.hero .lead{font-size:14px;color:var(--muted);margin-top:8px;max-width:42em}
.hero-img{border-radius:var(--r);overflow:hidden;min-height:160px;position:relative;display:grid;place-items:center;border:1px solid var(--line)}
.hero-img .ph{display:flex;flex-direction:column;align-items:center;gap:6px;color:rgba(255,255,255,.9)}
.hero-img .ph svg{width:36px;height:36px;opacity:.8}
.hero-img .ph span{font-size:12px;font-weight:800;opacity:.85}
.hero-img .label{position:absolute;bottom:10px;right:10px;font:800 10px/1 sans-serif;background:rgba(0,0,0,.3);color:#fff;padding:4px 8px;border-radius:999px}
.pills{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
.pill{height:36px;padding:0 13px;border:1.5px solid var(--sand);background:#fff;border-radius:999px;font-size:12.5px;font-weight:800;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:.15s}
.pill svg{width:14px;height:14px;opacity:.7}
.pill:hover{border-color:var(--green)}
.pill.on{background:var(--green);color:#fff;border-color:var(--green)}.pill.on svg{opacity:1}
/* summary visual */
.summary{display:grid;grid-template-columns:1fr;gap:14px}
.sum-visual{border-radius:14px;min-height:120px;position:relative;display:grid;place-items:center;overflow:hidden;border:1px solid var(--line)}
.sum-visual .ph{display:flex;flex-direction:column;align-items:center;gap:5px;color:rgba(255,255,255,.85)}
.sum-visual .ph svg{width:28px;height:28px;opacity:.7}
.sum-visual .ph span{font-size:11px;font-weight:800}
.sum-visual .label{position:absolute;bottom:8px;left:8px;font:800 9px/1 sans-serif;background:rgba(0,0,0,.28);color:#fff;padding:3px 7px;border-radius:999px}
@media(min-width:720px){.hero-grid{grid-template-columns:1.1fr .9fr;align-items:center}.hero-img{min-height:220px}.summary{grid-template-columns:1.1fr .9fr}.hero{padding:28px 0 22px}h1{font-size:36px}.hero .lead{font-size:15.5px}}
@media(min-width:1040px){.hero-img{min-height:280px}.hero{padding:36px 0 28px}h1{font-size:42px}.hero .lead{font-size:16px;max-width:36em}.sum-visual{min-height:160px}}
/* apt dropdown */
.aptsel{width:100%;height:44px;border:1.5px solid var(--sand);border-radius:12px;padding:0 12px;font-size:14px;background:#fff;color:var(--ink);appearance:auto}
.aptsel:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(82,122,67,.12)}
.apt-custom{margin-top:8px}

/* sections */
section{padding:0 0 22px}
.sec-t{font-size:17px;font-weight:950;letter-spacing:-.04em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec-t .badge{font-size:11px;font-weight:900;background:var(--green-soft);color:var(--green-deep);border:1px solid var(--green-line);border-radius:999px;padding:3px 8px}

/* summary card */
.summary{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
.summary h3{font-size:15px;font-weight:950;margin-bottom:12px}
.checks{display:flex;flex-direction:column;gap:10px}
.ck{display:flex;gap:9px;font-size:13.5px;line-height:1.5}
.ck .ic{width:22px;height:22px;border-radius:50%;background:var(--green);flex:none;display:grid;place-items:center}
.ck .ic svg{width:13px;height:13px}

/* steps */
.steps{display:grid;gap:14px}
@media(min-width:720px){.steps{grid-template-columns:repeat(3,1fr)}}
.step{background:#fff;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.step-h{padding:12px 14px;font-weight:950;font-size:14px;display:flex;align-items:center;gap:8px}
.step-h .n{width:24px;height:24px;border-radius:6px;display:grid;place-items:center;font-size:11px;font-weight:950;flex:none}
.step.diy .step-h{background:var(--green-soft);color:var(--green-deep)}.step.diy .n{background:var(--green);color:#fff}
.step.mfg .step-h{background:#FFF8ED;color:#8A6420}.step.mfg .n{background:#D4A243;color:#fff}
.step.mgmt .step-h{background:#EDF2F7;color:#4A5568}.step.mgmt .n{background:#5A6B7A;color:#fff}
.step.pro .step-h{background:var(--beige);color:var(--choco)}.step.pro .n{background:var(--choco);color:#fff}
.step-b{padding:14px;flex:1;display:flex;flex-direction:column}
.step-b ul{list-style:none;display:flex;flex-direction:column;gap:9px;flex:1}
.step-b li{display:flex;gap:8px;font-size:13px;line-height:1.5}
.step-b li .b{width:20px;height:20px;border-radius:6px;background:var(--green-soft);color:var(--green-deep);flex:none;display:grid;place-items:center;font:900 11px var(--font);margin-top:2px}
.step-b li b{font-weight:800;display:block;margin-bottom:2px}
.step-b li .desc{font-size:12px;color:var(--muted);line-height:1.55;display:block;margin-top:1px}
.step-b .act{margin-top:14px}
.btn{display:inline-flex;align-items:center;gap:7px;border-radius:10px;font-weight:900;font-size:13px;padding:10px 14px;transition:.15s;cursor:pointer;border:1.5px solid transparent;justify-content:center;width:100%}
.btn svg{width:16px;height:16px;flex:none}
.btn-g{background:#fff;color:#3c4043;border-color:var(--sand)}.btn-g:hover{background:#F7F5EF}
.btn-choco{background:var(--choco);color:#fff;border-color:var(--choco)}.btn-choco:hover{background:var(--choco-deep)}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}.btn-green:hover{background:var(--green-deep)}
.btn-ghost{background:#fff;color:var(--choco);border-color:var(--sand)}.btn-ghost:hover{background:var(--beige)}
.gg{width:16px;height:16px}

/* notice */
.notice{display:flex;gap:14px;background:var(--beige);border-radius:var(--r);padding:14px 16px;margin-top:14px;flex-wrap:wrap}
.notice .w{display:flex;gap:10px;flex:1;min-width:200px}
.notice .w svg{width:22px;height:22px;color:var(--choco);flex:none}
.notice .w h5{font-size:13px;font-weight:950;margin-bottom:6px}
.notice .w ul{list-style:none;display:flex;flex-direction:column;gap:4px}
.notice .w li{font-size:12.5px;color:var(--muted);padding-left:10px;position:relative}
.notice .w li::before{content:'•';position:absolute;left:0;color:var(--green)}
.notice .tip{flex:1;min-width:200px;display:flex;gap:9px;font-size:12px;color:var(--muted);line-height:1.55}
.notice .tip svg{width:18px;height:18px;color:#C79A3E;flex:none;margin-top:1px}
.notice .tip b{color:var(--ink)}

/* cases */
.cases{display:grid;gap:12px}
@media(min-width:720px){.cases{grid-template-columns:repeat(3,1fr)}.case .img{height:140px}}
.case{background:#fff;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:.15s}
.case:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(45,40,33,.1)}
.case .img{height:120px;position:relative;display:grid;place-items:center;color:#fff}
.case .img.c0{background:linear-gradient(135deg,#527A43,#315927)}
.case .img.c1{background:linear-gradient(135deg,#8A6E45,#5B4632)}
.case .img.c2{background:linear-gradient(135deg,#6E8A60,#46603A)}
.case .tag{position:absolute;top:9px;left:9px;font:900 10px/1 sans-serif;background:rgba(0,0,0,.3);color:#fff;padding:4px 8px;border-radius:999px}
.case .ext{position:absolute;top:9px;right:9px;width:22px;height:22px;border-radius:6px;background:rgba(0,0,0,.3);display:grid;place-items:center}
.case .ext svg{width:12px;height:12px}
.case .img .ph{font-size:12px;opacity:.9;display:flex;align-items:center;gap:6px}
.case .img .ph svg{width:20px;height:20px;opacity:.8}
.case .bd{padding:12px 13px}
.case .src{display:flex;align-items:center;gap:5px;font:900 10.5px/1 sans-serif;color:var(--muted);margin-bottom:6px}
.case .src .d{width:14px;height:14px;border-radius:4px;background:#03C75A;color:#fff;display:grid;place-items:center;font:900 8px/1 sans-serif}
.case h4{font-size:13.5px;font-weight:900;line-height:1.35;letter-spacing:-.02em}
.case .meta{margin-top:7px;font-size:11px;color:var(--soft);font-weight:700}

/* choose */
.choose{display:grid;gap:12px}
@media(min-width:720px){.choose{grid-template-columns:1fr 1fr}}
.cc{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:18px;display:flex;gap:14px;align-items:flex-start}
.cc .ic{width:44px;height:44px;border-radius:11px;flex:none;display:grid;place-items:center;color:#fff}
.cc .ic svg{width:22px;height:22px}
.cc.diy .ic{background:var(--green)}.cc.pro .ic{background:var(--choco)}
.cc h4{font-size:15px;font-weight:950;margin-bottom:8px}
.cc ul{list-style:none;display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.cc li{font-size:12.5px;color:var(--muted);display:flex;gap:6px}
.cc li svg{width:14px;height:14px;color:var(--green);flex:none;margin-top:2px}

/* footer */
footer{padding:22px 0;border-top:1px solid var(--line)}
.foot{display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--soft)}
.foot b{color:var(--green-deep);font-size:12px}

/* ─── small phone ─── */
@media(max-width:360px){
  .wrap{width:min(100% - 24px,1060px)}
  h1{font-size:24px}
  .hero .lead{font-size:13px}
  .hero-img{min-height:130px}
  .pills{gap:5px}
  .pill{height:32px;padding:0 10px;font-size:11px}
  .summary{padding:12px}
  .summary h3{font-size:14px}
  .ck{font-size:12.5px}
  .step-h{font-size:13px;padding:10px 12px}
  .step-b{padding:12px}
  .step-b li{font-size:12px}
  .step-b li .desc{font-size:11px}
  .sec-t{font-size:15px}
  .cc{padding:14px}
  .cc h4{font-size:14px}
  .notice{padding:12px}
  .case .img{height:100px}
  .case h4{font-size:12.5px}
}

/* ─── tablet+ section spacing ─── */
@media(min-width:720px){
  section{padding:0 0 28px}
  .sec-t{font-size:19px}
  .summary{padding:22px}
  .summary h3{font-size:17px}
  .step-h{font-size:15px}
  .notice{gap:24px}
  .cc{padding:22px}
  footer{padding:30px 0}
}

/* ─── desktop spacing ─── */
@media(min-width:1040px){
  section{padding:0 0 34px}
  .sec-t{font-size:21px}
  .steps{gap:18px}
  .cases{gap:16px}
  .case .img{height:160px}
  .cc{padding:26px}
  .notice{padding:18px 24px}
}

/* overlay + sheet */
.ov{position:fixed;inset:0;z-index:80;background:rgba(45,40,33,.48);display:none;align-items:flex-end}.ov.open{display:flex}
@media(min-width:720px){.ov{align-items:center}}
.sheet{width:100%;max-width:480px;margin:0 auto;background:#fff;border-radius:20px 20px 0 0;padding:18px 18px calc(18px + var(--safe-b));box-shadow:0 -12px 30px rgba(0,0,0,.16);max-height:92vh;overflow-y:auto;animation:up .25s ease}
@media(min-width:720px){.sheet{border-radius:22px;box-shadow:0 18px 50px rgba(0,0,0,.22)}}
@keyframes up{from{transform:translateY(20px);opacity:.6}to{transform:none;opacity:1}}
.sheet-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:14px}
.sheet h2{font-size:18px;font-weight:950}.sheet .sub{font-size:12.5px;color:var(--muted);margin-top:3px}
.x{width:32px;height:32px;border-radius:50%;background:var(--beige);font-size:18px;color:var(--muted);flex:none}
.field{margin-top:12px}.field label{display:block;font-size:12px;font-weight:950;margin-bottom:6px}.field .rq{color:var(--warn)}
.field input{width:100%;height:44px;border:1.5px solid var(--sand);border-radius:12px;padding:0 12px;font-size:14px}
.field input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(82,122,67,.12)}
.photos{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:6px}
.photo{position:relative;aspect-ratio:1;border-radius:9px;overflow:hidden;background:var(--beige)}.photo img{width:100%;height:100%;object-fit:cover}
.photo .rm{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:rgba(44,38,32,.8);color:#fff;font-size:12px;display:grid;place-items:center}
.addp{aspect-ratio:1;border:1.5px dashed var(--sand);border-radius:9px;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--muted);font-size:9px;font-weight:900}
.addp:hover{border-color:var(--green);color:var(--green-deep)}
.addp svg{width:16px;height:16px}
.hint{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.5}.hint b{color:var(--ink)}
.pv{margin-top:14px;background:#F4F1EA;border-radius:13px;padding:12px}
.pv .h{font:900 11px/1 sans-serif;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}.pv .h svg{width:13px;height:13px}
.bbl{background:#fff;border-radius:12px 12px 12px 3px;padding:11px 13px;font-size:12.5px;line-height:1.6;box-shadow:0 1px 2px rgba(45,40,33,.06)}.bbl b{color:var(--green-deep)}
.bbl .thumbs{display:flex;gap:4px;margin-top:7px}.bbl .mini{width:32px;height:32px;border-radius:6px;overflow:hidden;background:var(--beige)}.bbl .mini img{width:100%;height:100%;object-fit:cover}
.send{width:100%;height:48px;margin-top:14px;border-radius:13px;background:var(--choco);color:#fff;font-weight:950;font-size:14px;display:flex;align-items:center;justify-content:center;gap:7px}
.send:disabled{opacity:.42;cursor:not-allowed}.send svg{width:17px;height:17px}
.sms-note{text-align:center;font-size:11px;color:var(--soft);margin-top:7px}

/* leave modal */
.lv{position:fixed;inset:0;z-index:95;background:rgba(45,40,33,.5);display:none;align-items:center;justify-content:center;padding:20px}.lv.open{display:flex}
.lv-card{background:#fff;border-radius:18px;max-width:340px;width:100%;padding:24px 22px;text-align:center;animation:up .2s ease}
.lv-card .ic{width:44px;height:44px;border-radius:50%;background:var(--green-soft);color:var(--green-deep);display:grid;place-items:center;margin:0 auto 12px}.lv-card .ic svg{width:22px;height:22px}
.lv-card h4{font-size:16px;font-weight:950;margin-bottom:7px}.lv-card p{font-size:12.5px;color:var(--muted);line-height:1.55;margin-bottom:16px}
.lv-btns{display:flex;gap:8px}.lv-btns .btn{flex:1}

/* office sheet */
.off-hint{display:flex;gap:9px;background:var(--green-soft);border:1px solid var(--green-line);border-radius:12px;padding:10px 12px;margin-top:8px;font-size:11.5px;color:var(--muted);line-height:1.5}
.off-hint svg{width:16px;height:16px;flex:none;color:var(--green-deep);margin-top:1px}
.off-hint b{color:var(--ink)}
</style>
</head>

<header class="hd"><div class="wrap in">
  <a class="logo" href="apartmentmanual_home.html"><span class="logo-i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11 12 4l9 7"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg></span><span><b>아파트 사용설명서</b><small>우리집을 오래오래 건강하게</small></span></a>
  <nav class="nav"><a href="#">문제 해결 가이드</a><a href="#">사용설명서</a><a href="#">시공사례</a><a href="#">고객센터</a></nav>
  <button class="hd-btn" onclick="openConsult()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2Z"/></svg><span class="desktop">문자 상담 / AS 신청</span><span>문자상담</span></button>
</div></header>

<main id="main"></main>

<div class="ov" id="ovConsult" onclick="if(event.target===this)closeConsult()"><div class="sheet" id="shConsult"></div></div>
<div class="ov" id="ovOffice" onclick="if(event.target===this)closeOffice()"><div class="sheet" id="shOffice"></div></div>
<div class="lv" id="lvModal"><div class="lv-card"><div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 17 17 7M9 7h8v8"/></svg></div><h4>외부 사이트로 이동합니다</h4><p id="lvMsg"></p><div class="lv-btns"><button class="btn btn-ghost" onclick="closeLv()">취소</button><button class="btn btn-choco" id="lvGo" onclick="doLv()">이동</button></div></div></div>

<script>
/* ═══════════════════════════════════════════

let cur=0;
let CS={region:'서울 송파구',apt:'',aptCustom:'',photos:[]};
let offS={region:'서울 송파구',apt:''};
let lvUrl='';

/* ═══════════════════════════════════════════ HELPERS ═══════════════════════════════════════════ */
const $=id=>document.getElementById(id);

/* leave-site */
function openLv(url,site){lvUrl=url;$('lvMsg').textContent='이 링크는 외부 사이트('+site+')로 연결되며, \'아파트 사용설명서\'를 벗어납니다. 새 탭에서 열립니다.';$('lvGo').textContent=site+'(으)로 이동';$('lvModal').classList.add('open');}
function closeLv(){$('lvModal').classList.remove('open');}
function doLv(){if(lvUrl)window.open(lvUrl,'_blank');closeLv();}
function leaveG(q){openLv('https://www.google.com/search?q='+encodeURIComponent(q),'구글');}

/* consult */
function openConsult(){renderConsult();$('ovConsult').classList.add('open');document.body.style.overflow='hidden';}
function closeConsult(){$('ovConsult').classList.remove('open');document.body.style.overflow='';}
function addPhotos(e){[...e.target.files].slice(0,8-CS.photos.length).forEach(f=>{const r=new FileReader();r.onload=()=>{CS.photos.push(r.result);renderConsult();};r.readAsDataURL(f);});}
function rmPhoto(i){CS.photos.splice(i,1);renderConsult();}
function renderConsult(){
 const s=SYM[cur],label=s.space+' '+s.fix+' · '+s.h1.join(' ');
 const ph=CS.photos.map((p,i)=>'<div class="photo"><img src="'+p+'"><button class="rm" onclick="rmPhoto('+i+')">×</button></div>').join('');
 const add=CS.photos.length<8?'<label class="addp"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="6" width="18" height="13" rx="2"/><circle cx="12" cy="12.5" r="3"/></svg>사진 추가<input type="file" accept="image/*" multiple style="display:none" onchange="addPhotos(event)"></label>':'';
 const thumbs=CS.photos.length?'<div class="thumbs">'+CS.photos.slice(0,4).map(p=>'<div class="mini"><img src="'+p+'"></div>').join('')+(CS.photos.length>4?'<div class="mini" style="display:grid;place-items:center;font:900 10px sans-serif;color:var(--soft)">+'+String(CS.photos.length-4)+'</div>':'')+'</div>':'';
 $('shConsult').innerHTML=
  '<div class="sheet-hd"><div><h2>문자로 상담 신청</h2><p class="sub">현장 사진이 없으면 전송할 수 없습니다.</p></div><button class="x" onclick="closeConsult()">×</button></div>'+
  '<div style="display:flex;align-items:center;gap:8px;background:var(--green-soft);color:var(--green-deep);font:800 12.5px sans-serif;padding:10px 12px;border-radius:10px">'+IC.chk.replace('#fff','var(--green-deep)')+'<span>증상 자동 입력: <b>'+s.fix+' · '+s.h1.join(' ')+'</b></span></div>'+
  '<div class="field"><label>지역 <span class="rq">*</span></label><input id="cR" value="'+CS.region+'"></div>'+
  '<div class="field"><label>아파트명 <span class="rq">*</span></label><select class="aptsel" id="cA" onchange="if(this.value===\'직접 입력\'){document.getElementById(\'cAcustom\').style.display=\'block\'}else{document.getElementById(\'cAcustom\').style.display=\'none\'}"><option value="">아파트를 선택하세요</option>'+APTS.map(a=>'<option value="'+a+'"'+(CS.apt===a?' selected':'')+'>'+a+'</option>').join('')+'</select><input class="apt-custom" id="cAcustom" style="display:'+(CS.apt==='직접 입력'?'block':'none')+';width:100%;height:44px;border:1.5px solid var(--sand);border-radius:12px;padding:0 12px;font-size:14px" placeholder="아파트·건물명을 입력하세요" value="'+(CS.aptCustom||'')+'"></div>'+
  '<div class="field"><label>현장 사진 <span class="rq">* 필수</span></label><div class="photos">'+ph+add+'</div><p class="hint">사진이 있으면 <b>상담이 훨씬 정확</b>해집니다. 1장 이상 첨부해야 전송할 수 있어요.</p></div>'+
  '<div class="pv"><div class="h">'+IC.sms+'보낼 문자 미리보기</div><div class="bbl"><b>[아파트 사용설명서 상담]</b><br>지역: '+CS.region+'<br>아파트: '+(aptName()||'(선택해 주세요)')+'<br>증상: '+label+'<br>※ 현장 사진 '+CS.photos.length+'장 첨부.'+thumbs+'</div></div>'+
  '<button class="send '+(CS.photos.length?'':'') +'" '+(CS.photos.length?'':'disabled')+' onclick="sendSMS()">'+IC.sms+(CS.photos.length?'문자로 상담 보내기':'현장 사진을 먼저 첨부하세요')+'</button>'+
  '<p class="sms-note">010-0000-0000 · 전문가 직통 (예시 번호)</p>';
}
function aptName(){return CS.apt==='직접 입력'?(CS.aptCustom||''):CS.apt;}
function sendSMS(){
 if(!CS.photos.length){alert('현장 사진을 1장 이상 첨부해야 합니다.');return;}
 const r=$('cR'),a=$('cA'),ac=$('cAcustom');if(r)CS.region=r.value;if(a)CS.apt=a.value;if(ac)CS.aptCustom=ac.value;
 const an=aptName();if(!an){alert('아파트명을 선택하거나 입력해 주세요.');return;}
 const s=SYM[cur],body=['[아파트 사용설명서 상담]','지역: '+CS.region,'아파트: '+an,'증상: '+s.fix+' · '+s.h1.join(' '),'※ 현장 사진 '+CS.photos.length+'장 첨부합니다.'].join('\n');
 const sep=/iphone|ipad|mac/i.test(navigator.userAgent)?'&':'?';
 location.href='sms:01000000000'+sep+'body='+encodeURIComponent(body);
}

/* office */
function openOffice(){renderOffice();$('ovOffice').classList.add('open');document.body.style.overflow='hidden';}
function closeOffice(){$('ovOffice').classList.remove('open');document.body.style.overflow='';}
function renderOffice(){
 const lb=(offS.region+' '+offS.apt).trim()||'[지역] [아파트]';
 $('shOffice').innerHTML=
  '<div class="sheet-hd"><div><h2>관리사무소 연락처 찾기</h2><p class="sub">지역과 아파트명을 입력하면 구글에서 검색합니다.</p></div><button class="x" onclick="closeOffice()">×</button></div>'+
  '<div class="field"><label>지역명 <span class="rq">*</span></label><input id="oR" value="'+offS.region+'" placeholder="예: 서울 송파구"></div>'+
  '<div class="field"><label>아파트·단지명 <span class="rq">*</span></label><input id="oA" value="'+offS.apt+'" placeholder="예: 트리지움"></div>'+
  '<div class="off-hint"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17 17 7M9 7h8v8"/></svg><span>버튼을 누르면 <b>구글 검색 결과(외부)</b>로 이동합니다.</span></div>'+
  '<button class="btn btn-g" style="width:100%;margin-top:14px;padding:13px" onclick="offGo()">'+GL+'<span id="oLbl">구글에서 '+lb+' 관리사무소 연락처 보기</span></button>';
 const upd=()=>{offS.region=$('oR').value;offS.apt=$('oA').value;const l2=(offS.region+' '+offS.apt).trim()||'[지역] [아파트]';$('oLbl').textContent='구글에서 '+l2+' 관리사무소 연락처 보기';};
 setTimeout(()=>{const r=$('oR'),a=$('oA');if(r)r.oninput=upd;if(a)a.oninput=upd;},50);
}
function offGo(){if($('oR'))offS.region=$('oR').value;if($('oA'))offS.apt=$('oA').value;if(!offS.apt.trim()){alert('아파트·단지명을 입력해 주세요.');return;}closeOffice();openLv('https://www.google.com/search?q='+encodeURIComponent((offS.region+' '+offS.apt+' 관리사무소 연락처').trim()),'구글');}

/* ═══════════════════════════════════════════ VISUALS PER SYMPTOM ═══════════════════════════════════════════ */
const VIS={
 s01:{grad:'linear-gradient(135deg,#7A9E6A,#4A6D3C)',label:'주방 싱크대',ico:'<path d="M5 8h6v3M11 9.5h5a3 3 0 0 1 3 3V14M16 14v3a2 2 0 0 1-2 2h-1M3 8h2M7 11v2"/>'},
 s02:{grad:'linear-gradient(135deg,#8A7B65,#5B4632)',label:'욕실 변기',ico:'<path d="M6 4h8v6a5 5 0 0 1-10 0V8M6 14l-1 4a3 3 0 0 0 3 3h2M16 4v5a2 2 0 0 0 2 2h1"/>'},
 s03:{grad:'linear-gradient(135deg,#5A8B7A,#3A6455)',label:'욕실 샤워',ico:'<path d="M4 4h6a4 4 0 0 1 4 4M14 8h6M17 8v0M9 14v.01M12 17v.01M15 14v.01M7 17v.01"/>'},
 s04:{grad:'linear-gradient(135deg,#6B8E70,#456B4A)',label:'세면대',ico:'<path d="M5 8h6v3M11 9.5h5a3 3 0 0 1 3 3V14M16 14v3a2 2 0 0 1-2 2h-1M3 8h2"/>'},
 s05:{grad:'linear-gradient(135deg,#7A7A8A,#4A4A5A)',label:'욕실 환풍기',ico:'<circle cx="12" cy="12" r="2"/><path d="M12 10c0-4 1-7 0-7s-3 3-3 5 1.5 2 3 2ZM14 12c4 0 7 1 7 0s-3-3-5-3-2 1.5-2 3ZM12 14c0 4-1 7 0 7s3-3 3-5-1.5-2-3-2ZM10 12c-4 0-7-1-7 0s3 3 5 3 2-1.5 2-3Z"/>'},
 s06:{grad:'linear-gradient(135deg,#7A9E6A,#4A6D3C)',label:'싱크대 배수통',ico:'<circle cx="12" cy="12" r="8"/><path d="M12 8v8M8 12h8"/>'},
 s07:{grad:'linear-gradient(135deg,#9A8A6A,#6A5A3A)',label:'방등·거실등',ico:'<path d="M9 18h6M10 21h4M12 3a6 6 0 0 0-4 10c.7.7 1 1.5 1 2h6c0-.5.3-1.3 1-2a6 6 0 0 0-4-10Z"/>'},
 s08:{grad:'linear-gradient(135deg,#8A7B65,#5B4632)',label:'방문',ico:'<rect x="6" y="3" width="12" height="18" rx="2"/><path d="M14 12h.5"/>'},
 s09:{grad:'linear-gradient(135deg,#6B8E70,#456B4A)',label:'세면대 배수',ico:'<path d="M6 4v6a3 3 0 0 0 3 3h0a3 3 0 0 1 3 3v0M6 4h4M16 14v6"/>'},
 s10:{grad:'linear-gradient(135deg,#7A7A8A,#4A4A5A)',label:'현관',ico:'<path d="M9 18h6M10 21h4M12 3a6 6 0 0 0-4 10c.7.7 1 1.5 1 2h6c0-.5.3-1.3 1-2a6 6 0 0 0-4-10Z"/>'}
};
const APTS=['트리지움','리센츠','헬리오시티','레이크팰리스','파크리오','잠실엘스','우성아파트','장미아파트','올림픽선수기자촌','아시아선수촌','직접 입력'];

/* ═══════════════════════════════════════════ RENDER ═══════════════════════════════════════════ */
function render(){
const s=SYM[cur];
const v=VIS[s.id];
const pills=SYM.map((x,i)=>'<button class="pill '+(i===cur?'on':'')+'" onclick="cur='+i+';history.replaceState(null,\'\',\'?s=\'+SYM['+i+'].id);render();window.scrollTo({top:0,behavior:\'smooth\'})">'+x.pill+'</button>').join('');

/* group steps by type */
const grouped={};
s.steps.forEach(st=>{if(!grouped[st[0]])grouped[st[0]]=[];grouped[st[0]].push({title:st[1],desc:st[2]||''});});
const order=['diy','mfg','mgmt','pro'];
let stepsHTML='';
order.forEach(t=>{
 if(!grouped[t])return;
 const items=grouped[t].map((st,i)=>'<li><span><b>'+st.title+'</b>'+(st.desc?'<br><span class="desc">'+st.desc+'</span>':'')+'</span></li>').join('');
 let act='';
 if(t==='diy') act='<div class="act"><button class="btn btn-g" onclick="leaveG(\''+s.gkw+'\')">'+GL+'구글에서 DIY 방법 보기</button></div>';
 if(t==='mgmt') act='<div class="act"><button class="btn btn-ghost" onclick="openOffice()">관리사무소 연락처 확인 →</button></div>';
 if(t==='pro') act='<div class="act"><button class="btn btn-green" onclick="openConsult()">'+IC.sms+'문자 상담 / AS 신청</button></div>';
 if(t==='mfg') act='<div class="act"><button class="btn btn-ghost" onclick="leaveG(\''+s.fix+' 제조사 AS 연락처\')">'+GL+'제조사 AS 연락처 찾기</button></div>';
 stepsHTML+='<div class="step '+t+'"><div class="step-h"><span class="n">'+({'diy':'DIY','mfg':'AS','mgmt':'관리','pro':'전문'}[t])+'</span>'+STEP_LABEL[t]+'</div><div class="step-b"><ul>'+items+'</ul>'+act+'</div></div>';
});

/* cases */
const posts=POSTS[s.id]||[];
const casesHTML=posts.map((p,i)=>{
 const has=!!p.url;const blogHome='https://m.blog.naver.com/mac6765';
 return '<div class="case" onclick="openLv(\''+(has?p.url:blogHome)+'\',\'네이버 블로그\')"><div class="img c'+i+'"><span class="tag">시공 전·후 사진</span><span class="ext">'+IC.ext+'</span><div class="ph">'+IC.cam+'<span>실제 시공 사진</span></div></div><div class="bd"><div class="src"><span class="d">N</span>'+(has?'네이버 블로그 글 보기':'블로그 글 준비 중')+'</div><h4>'+p.title+'</h4><div class="meta">📍 송파구 · '+s.fix+' 시공 완료</div></div></div>';}).join('');

const warnLi=s.warn.map(w=>'<li>'+w+'</li>').join('');
const sumCk=s.sum.map(t=>'<div class="ck"><span class="ic">'+IC.chk+'</span><span>'+t+'</span></div>').join('');

$('main').innerHTML=
'<div class="wrap"><div class="crumb"><a href="apartmentmanual_home.html" style="color:var(--green-deep);font-weight:800">← 홈</a> <span class="sep">›</span> 문제 해결 가이드 <span class="sep">›</span> '+s.space+' <span class="sep">›</span> <b>'+s.fix+'</b></div></div>'+

'<div class="wrap hero"><div class="hero-grid"><div><h1>'+s.h1[0]+'<br>'+s.h1[1]+'</h1><p class="lead">'+s.lead+'</p><div class="pills">'+pills+'</div></div>'+
'<div class="hero-img" style="background:'+v.grad+'"><div class="ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">'+v.ico+'</svg><span>'+v.label+' 이미지</span></div><span class="label">실제 시공 사진 자리</span></div></div></div>'+

'<div class="wrap"><section><div class="summary"><div><h3>한눈에 요약</h3><div class="checks">'+sumCk+'</div></div>'+
'<div class="sum-visual" style="background:'+v.grad.replace(/135deg/,'160deg')+'"><div class="ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">'+v.ico+'</svg><span>부품 구조도</span></div><span class="label">부품 위치 일러스트</span></div></div></section>'+

'<section><div class="sec-t">해결 방법 <span class="badge">단계별 가이드</span></div><div class="steps">'+stepsHTML+'</div>'+
'<div class="notice"><div class="w">'+IC.warn+'<div><h5>주의사항</h5><ul>'+warnLi+'</ul></div></div><div class="tip">'+IC.tip+'<span><b>TIP</b> '+s.tip+'</span></div></div></section>'+

'<section><div class="sec-t">실제 시공사례 <span class="badge">블로그 연동</span></div><div class="cases">'+casesHTML+'</div></section>'+

'<section><div class="sec-t">어떤 선택이 좋을까요?</div><div class="choose">'+
'<div class="cc diy"><span class="ic">'+IC.diy+'</span><div><h4>직접 해결해 보세요</h4><ul><li>'+IC.chk.replace('#fff','var(--green)')+'간단한 이물질 제거로 해결될 것 같아요.</li><li>'+IC.chk.replace('#fff','var(--green)')+'부품 교체 경험이 조금 있어요.</li><li>'+IC.chk.replace('#fff','var(--green)')+'시간적 여유가 있어요.</li></ul><button class="btn btn-g" onclick="leaveG(\''+s.gkw+'\')">'+GL+'구글에서 DIY 방법 보기</button></div></div>'+
'<div class="cc pro"><span class="ic">'+IC.person+'</span><div><h4>전문가에게 맡기세요</h4><ul><li>'+IC.chk.replace('#fff','var(--green)')+'원인을 정확히 알기 어려워요.</li><li>'+IC.chk.replace('#fff','var(--green)')+'이전에 시도했지만 해결되지 않았어요.</li><li>'+IC.chk.replace('#fff','var(--green)')+'빠르고 확실한 해결을 원해요.</li></ul><button class="btn btn-choco" onclick="openConsult()">'+IC.sms+'문자 상담 / AS 신청</button></div></div></div></section></div>'+

'<footer><div class="wrap foot"><b>아파트 사용설명서</b><span>apartmentmanual.com</span><span>© 2026 Apartment Manual. 송파·잠실 기반 아파트 유지보수 위키.</span></div></footer>';
}

/* read URL param on load */
const params=new URLSearchParams(location.search);
const startId=params.get('s');
if(startId){const idx=SYM.findIndex(s=>s.id===startId);if(idx>=0)cur=idx;}

render();
</script>
