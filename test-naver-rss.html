<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>네이버 블로그 RSS 연동 테스트</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 920px; margin: 40px auto; padding: 0 20px; line-height: 1.6; }
    .status { padding: 12px 14px; border: 1px solid #ddd; border-radius: 10px; background: #fafafa; }
    .card { padding: 16px; border: 1px solid #e5e5e5; border-radius: 14px; margin: 12px 0; }
    .card a { font-weight: 700; color: inherit; }
    .date { color: #666; font-size: 14px; margin-top: 4px; }
    pre { white-space: pre-wrap; overflow-wrap: anywhere; background: #f7f7f7; padding: 12px; border-radius: 10px; }
  </style>
</head>
<body>
  <h1>네이버 블로그 RSS 연동 테스트</h1>
  <p class="status" id="status">/api/naver-rss 불러오는 중...</p>
  <div id="list"></div>
  <h2>원본 XML 앞부분</h2>
  <pre id="preview"></pre>

  <script>
    async function run() {
      const status = document.getElementById('status');
      const list = document.getElementById('list');
      const preview = document.getElementById('preview');

      try {
        const res = await fetch('/api/naver-rss', { cache: 'no-cache' });
        const xmlText = await res.text();
        preview.textContent = xmlText.slice(0, 1200);

        if (!res.ok) {
          status.textContent = `실패: HTTP ${res.status}`;
          return;
        }

        const doc = new DOMParser().parseFromString(xmlText, 'application/xml');
        const items = Array.from(doc.querySelectorAll('item')).slice(0, 10);

        status.textContent = `성공: RSS 글 ${items.length}개를 읽었습니다.`;

        list.innerHTML = items.map((item) => {
          const title = item.querySelector('title')?.textContent ?? '(제목 없음)';
          const link = item.querySelector('link')?.textContent ?? '#';
          const pubDate = item.querySelector('pubDate')?.textContent ?? '';
          const description = item.querySelector('description')?.textContent ?? '';
          const plain = description.replace(/<[^>]*>/g, '').slice(0, 120);
          return `
            <article class="card">
              <a href="${link}" target="_blank" rel="noopener">${title}</a>
              <div class="date">${pubDate}</div>
              <p>${plain}${plain.length >= 120 ? '...' : ''}</p>
            </article>
          `;
        }).join('');
      } catch (err) {
        status.textContent = `오류: ${err.message}`;
      }
    }

    run();
  </script>
</body>
</html>
